<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body>
<script>
setInterval(Time_now,5000);

function Time_now() {
  let date = new Date();
  document.getElementById("time").innerHTML ='板橋標準時間：'+date.toLocaleString('zh-TW',{hourCycle:'h23'});
}
</script>

<div style=color:rgb(0,255,0);background-color:rgb(82,82,82);width:283px;height:19px; margin: 0px auto; overflow: hidden;>
<p id=time></p>
</div>
</body>
</html>
